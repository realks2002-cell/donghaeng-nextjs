<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>연결 안됨</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; padding: 32px;
      background: #fff; color: #111; text-align: center;
    }
    .icon {
      width: 72px; height: 72px; border-radius: 20px;
      background: #fff7ed; display: flex;
      align-items: center; justify-content: center;
      margin-bottom: 24px;
    }
    h1 { font-size: 22px; font-weight: 800; margin-bottom: 12px; }
    p { font-size: 15px; color: #666; line-height: 1.6; margin-bottom: 32px; }
    button {
      background: #f97316; color: #fff; border: none;
      padding: 14px 40px; border-radius: 9999px;
      font-size: 16px; font-weight: 700; cursor: pointer;
    }
    button:active { background: #ea580c; }
    .home {
      margin-top: 16px; background: none; color: #999;
      font-size: 14px; padding: 8px;
    }
  </style>
</head>
<body>
  <div class="icon">
    <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#f97316" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="2" x2="22" y1="2" y2="22"/><path d="M8.5 16.5a5 5 0 0 1 7 0"/><path d="M2 8.82a15 15 0 0 1 4.17-2.65"/><path d="M10.66 5c4.01-.36 8.14.9 11.34 3.76"/><path d="M16.85 11.25a10 10 0 0 1 2.22 1.68"/><path d="M5 13a10 10 0 0 1 5.24-2.76"/><line x1="12" x2="12.01" y1="20" y2="20"/></svg>
  </div>
  <h1>인터넷 연결을 확인해주세요</h1>
  <p>서비스 이용을 위해<br>네트워크 연결이 필요합니다.</p>
  <button onclick="location.reload()">다시 시도</button>
  <button class="home" onclick="window.location.href='index.html'">메인으로 돌아가기</button>
</body>
</html>
